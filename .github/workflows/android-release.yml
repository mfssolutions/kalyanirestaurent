name: Android Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0) — optional override'
        required: false
        default: ''
      version_code:
        description: 'Version code (integer) — optional override'
        required: false
        default: ''

permissions:
  contents: write   # needed for creating GitHub Releases on tag push

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed AAB + APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # ---- Frontend env (Vite needs these at build time) ----
      VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_SUPABASE_URL:                ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY:           ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Validate required secrets
        run: |
          missing=0
          for v in VITE_FIREBASE_API_KEY VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::Missing required secret: ANDROID_KEYSTORE_BASE64"; missing=1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "::error::Missing required secret: GOOGLE_SERVICES_JSON_BASE64"; missing=1
          fi
          [ $missing -eq 0 ] || exit 1

      - name: Install npm dependencies
        run: npm ci

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p android/app
          echo "env var length: ${#GS_B64}"
          printf '%s' "$GS_B64" > /tmp/gs.b64
          echo "wrote bytes: $(wc -c < /tmp/gs.b64)"
          base64 -di /tmp/gs.b64 > android/app/google-services.json
          echo "decoded bytes: $(wc -c < android/app/google-services.json)"
          rm -f /tmp/gs.b64
          # sanity check: must be valid JSON containing the right package
          node -e "const j=require('./android/app/google-services.json');\
            const ok=j.client.some(c=>c.client_info.android_client_info.package_name==='com.kalyanikitchen.app');\
            if(!ok){console.error('google-services.json missing com.kalyanikitchen.app');process.exit(1)}"

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "env var length: ${#KS_B64}"
          printf '%s' "$KS_B64" > /tmp/ks.b64
          base64 -di /tmp/ks.b64 > android/app/release.jks
          rm -f /tmp/ks.b64
          ls -lh android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Resolve version
        id: version
        run: |
          # Priority: workflow_dispatch input > git tag (vX.Y.Z) > package.json > fallback
          VN="${{ github.event.inputs.version_name }}"
          VC="${{ github.event.inputs.version_code }}"
          if [ -z "$VN" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VN="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$VN" ]; then
            VN=$(node -p "require('./package.json').version || '1.0.0'")
          fi
          if [ -z "$VC" ]; then
            VC=${{ github.run_number }}
          fi
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "Using versionName=$VN versionCode=$VC"

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Locate artifacts
        id: artifacts
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -lh "$AAB" "$APK"

      - name: Rename artifacts with version
        run: |
          V=${{ steps.version.outputs.name }}
          C=${{ steps.version.outputs.code }}
          cp "${{ steps.artifacts.outputs.aab }}" "kalyani-kitchen-v${V}-${C}.aab"
          cp "${{ steps.artifacts.outputs.apk }}" "kalyani-kitchen-v${V}-${C}.apk"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalyani-kitchen-aab-v${{ steps.version.outputs.name }}
          path: kalyani-kitchen-v*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalyani-kitchen-apk-v${{ steps.version.outputs.name }}
          path: kalyani-kitchen-v*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            kalyani-kitchen-v*.aab
            kalyani-kitchen-v*.apk

      - name: Cleanup signing artifacts
        if: always()
        run: |
          rm -f android/key.properties android/app/release.jks android/app/google-services.json
